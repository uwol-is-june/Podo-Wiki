<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포도위키 이메일 인증</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f4f4f5; margin: 0; padding: 40px 16px;">
  <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">

    <!-- 헤더 -->
    <div style="background: #6a39c0; padding: 32px 40px; text-align: center;">
      <p style="color: #ffffff; font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.3px;">🍇 포도위키</p>
      <p style="color: rgba(255,255,255,0.75); font-size: 13px; margin: 6px 0 0;">공연단체 인수인계 위키 플랫폼</p>
    </div>

    <!-- 본문 -->
    <div style="padding: 36px 40px;">
      <h1 style="font-size: 18px; font-weight: 600; color: #18181b; margin: 0 0 14px; letter-spacing: -0.2px;">이메일 주소를 인증해주세요</h1>
      <p style="font-size: 14px; color: #52525b; line-height: 1.7; margin: 0 0 28px;">
        포도위키에 가입 신청해주셔서 감사합니다.<br>
        아래 버튼을 눌러 이메일 인증을 완료해주세요.<br>
        인증 후 관리자 승인을 받으면 문서를 자유롭게 편집할 수 있습니다.
      </p>
      <div style="text-align: center; margin: 0 0 28px;">
        <a href="{{ .ConfirmationURL }}"
           style="display: inline-block; background: #6a39c0; color: #ffffff; font-size: 15px; font-weight: 600; text-decoration: none; padding: 14px 36px; border-radius: 8px; letter-spacing: -0.1px;">
          이메일 인증하기
        </a>
      </div>
      <p style="font-size: 12px; color: #a1a1aa; line-height: 1.7; margin: 0; border-top: 1px solid #f4f4f5; padding-top: 20px;">
        이 링크는 24시간 동안 유효합니다.<br>
        본인이 가입 신청하지 않으셨다면 이 메일을 무시하시면 됩니다.
      </p>
    </div>

    <!-- 푸터 -->
    <div style="background: #fafafa; border-top: 1px solid #f0f0f0; padding: 18px 40px; text-align: center;">
      <p style="font-size: 12px; color: #a1a1aa; margin: 0;">
        포도위키 &middot;
        <a href="{{ .SiteURL }}" style="color: #6a39c0; text-decoration: none;">podo-wiki.vercel.app</a>
      </p>
    </div>

  </div>
</body>
</html>
